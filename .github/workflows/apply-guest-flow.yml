name: Apply guest entry flow

on:
  push:
    branches: [main]
    paths:
      - scripts/apply-guest-flow.js
      - .github/workflows/apply-guest-flow.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Patch index.html
        run: node scripts/apply-guest-flow.js

      - name: Commit patched frontend
        run: |
          if git diff --quiet -- index.html; then
            echo "index.html already patched"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Pokaż menu przed logowaniem na statycznej stronie"
          git push
